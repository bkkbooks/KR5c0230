body:
  text: 神氣養形論混元既分天地得位人與萬物各分一氣而成形動者稟乎天靜者法乎地天地之間最靈者人能養人之形者唯氣與神神者妙萬物而為言氣者借沖虛以為用至人之言莫先乎氣至人之用莫妙乎神我先生得至人之道見生死之機常味於無味用於無用為於無為事於無事知神氣可以留形故守虛無以養神氣知杳冥可以致信故入杳冥而觀至精則天地之間其猶橐籥乎至人之不死其猶谷神乎先生曰虛無之中有物謂之神杳冥之中有物謂之氣氣者結虛無以成妙故大洞真人曰三月內視注心一神則神光化生纒綿五藏其理眀矣且氣者神之母神者氣之子欲致其子先修其母若使神不受味於氣則氣無以通靈子不求食於母則母無以致和道經曰既得其毋以守其子既得其子復守其母東華玉書云繫子長存心安寧此皆謂修真之要言也加以耳目者神之尸牖隂陽者氣之千戈也夫能閉尸牖息干戈皆在神氣之默用若氣有所習神有所歸即無關楗而不可開無繩約而不可解萬物貞明皆奉不言之教任無為之化矣道經云視之不見聽之不聞搏之不得吾將內靜虛無杳冥之宰當視不見之形聽不聞之聲搏不得之物三者皆得即我命在我不在於天尹具人曰內觀神光不可謂無眀反聽神聲不可謂無音握固精神不可謂無形故修道人為梘者見為聽者聞為搏者得有古之真人其寢不夢其覺無憂先生曰我亦不夢謂之神遊我神常遊不繫於晝夜獨處於逍遙之墟不貸之圃是謂采真之樂矣吾欲分而為赤子則赤子因氣母而成形吾欲分而為嬰兒則嬰兒因氣母而成質吾欲分而為真人則真人因氣母而致靈此三者不可分故混而為一一為我神神在我身中嗟乎妄作之儔或存或守胡為爾丹胡為爾青心迷爾真目亂爾形不知形者不可與言氣不知氣者不可與言神知乎形知乎神者則資乎道矣且氣不能運則純精不應神不能用則真景不明故神明而能使氣氣專而能應神則知不修不能自明氣不専不能自柔道經曰専氣致柔能如嬰兒乎黃庭經曰仙人道士非有神精精纍氣乃成真正謂此也後來學者或吐或納四時五芽之氣或服引七宿二景之精握固以象胎形閉氣以為胎息殊乖真人之妙旨蓋是古來之末事如此之徒濁亂元氣尤損於形神夫至人以心遊於淡氣合於漢飲漱於玄泉胎息於無味則神光內照五臟生靈自然有紫煙上浮玉彩交映敬傳先生之旨化白為朱積精成形口銜靈芝降於形中是為真仙之術守中抱一勿失與天地齊畢神氣養形論
