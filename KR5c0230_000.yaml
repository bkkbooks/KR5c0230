body:
  text: 神氣養形論混元既分天地得位人與萬物各分一炁而成形動者禀乎天靜者法乎地天地之間最靈者人能養人之形者唯炁與神神者妙萬物而爲言氣者借冲虚以爲用至人之言莫先乎炁至人之用莫妙乎神我先生得至人之道見生死之機常味於无味用於无用爲於无爲事於无事知神炁可以留形故守虚无以養神炁知杳㝠可以致信故入杳㝠而觀至精則天地之間其猶橐籥乎至人之不死其猶谷神乎先生曰虚无之中有物謂之神杳㝠之中有物謂之炁炁者結虛無以成妙故大洞眞人曰三月内視注心一神則神光化生纒綿五藏其理眀矣且炁者神之母神者炁之子欲致其子先修其母若使神不受味於炁則炁无以通靈子不求食於母則母无以致和道經曰既得其毋以守其子既得其子復守其母東華玉書云繫子長存心安寧此皆謂修眞之要言也加以耳目者神之尸牖隂陽者炁之千戈也夫能閉尸牖息干戈皆在神炁之默用若炁有所習神有所歸即无關楗而不可開无繩約而不可解萬物貞明皆奉不言之教任无爲之化矣道經云視之不見聽之不聞搏之不得吾將內靜虛无杳㝠之宰當視不見之形聽不聞之聲搏不得之物三者皆得即我命在我不在於天尹具人曰内觀神光不可謂无眀反聽神聲不可謂无音握固精神不可謂无形故修道人爲梘者見爲聽者聞爲搏者得有古之眞人其寢不夢其覺无憂先生曰我亦不夢謂之神遊我神常遊不繫於晝夜獨處於逍遥之墟不貸之圃是謂采眞之樂矣吾欲分而爲赤子則赤子因炁母而成形吾欲分而爲嬰兒則嬰兒因炁母而成質吾欲分而爲眞人則眞人因炁母而致靈此三者不可分故混而爲一一爲我神神在我身中嗟乎妄作之儔或存或守胡爲爾丹胡爲爾青心迷爾眞目亂爾形不知形者不可與言炁不知炁者不可與言神知乎形知乎神者則資乎道矣且炁不能運則純精不應神不能用則眞景不明故神明而能使炁炁專而能應神則知不修不能自明炁不専不能自柔道經曰専炁致柔能如嬰兒乎黄庭經曰仙人道士非有神精精累炁廼成眞正謂此也後來學者或吐或納四時五芽之炁或服引七宿二景之精握固以象胎形𨳲炁以爲胎息殊乖眞人之妙旨盖是古來之末事如此之徒濁亂元炁尤損於形神夫至人以心遊於淡炁合於漢飲漱於玄泉胎息於无味則神光內照五臟生靈自然有紫煙上浮玉彩交映敬傳先生之旨化白爲朱積精成形口衘靈芝降於形中是爲眞仙之術守中抱一勿失與天地齊畢神氣養形論
